function fmt(n, money){
  if (n === null || n === undefined) return '—';
  const a = Math.abs(n); let s;
  if (a >= 1e9) s = (n/1e9).toFixed(2)+'b';
  else if (a >= 1e6) s = (n/1e6).toFixed(2)+'m';
  else if (a >= 1e4) s = (n/1e3).toFixed(1)+'k';
  else if (money && a >= 100) s = Math.round(n).toLocaleString('en-US');
  else if (money) s = n.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
  else if (a >= 100 || n === Math.round(n)) s = Math.round(n).toLocaleString('en-US');
  else s = n.toFixed(2);
  return money ? (n < 0 ? '-$'+s.replace('-','') : '$'+s) : s;
}

function drawChart(el, cfg){
  const rs = rows(), labels = rs.map(r => r.date), n = labels.length;
  if (!n){ el.innerHTML = '<div class="sub" style="padding:24px 0">no data yet</div>'; return []; }
  const series = cfg.build(rs).filter(s => s.vals.some(v => v !== null && v !== undefined));
  const hasR = series.some(s => s.axis === 'r');
  const W = cfg.hero ? 980 : 560, H = cfg.hero ? 270 : 200;
  const padL = hasR ? 56 : 10, padR = 56, padT = 12, padB = 24;
  const iw = W-padL-padR, ih = H-padT-padB;
  const xc = i => padL + (i+0.5)/n*iw;
  const plotted = series.map(s => s.vals.map(v => v==null ? null : (s.down ? -v : v)));
  let lMax = 1, lMin = 0, rMax = 1;
  series.forEach((s,si) => plotted[si].forEach(v => { if (v==null) return;
    if (s.axis==='r') rMax = Math.max(rMax, v); else { lMax = Math.max(lMax, v); lMin = Math.min(lMin, v); } }));
  const yL = v => padT + ih - (v-lMin)/((lMax-lMin)||1)*ih;
  const yR = v => padT + ih - v/(rMax||1)*ih;
  let svg = `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica Neue,Arial,sans-serif">`;
  for (const f of [0,.5,1]){
    const v = lMin + f*(lMax-lMin), y = yL(v);
    svg += `<line x1="${padL}" y1="${y.toFixed(1)}" x2="${W-padR}" y2="${y.toFixed(1)}" stroke="${C.line}"/>`;
    svg += `<text x="${W-padR+6}" y="${(y+3.5).toFixed(1)}" fill="${C.dust}" font-size="10">${fmt(v,cfg.money)}</text>`;
    if (hasR) svg += `<text x="${padL-6}" y="${(yR(f*rMax)+3.5).toFixed(1)}" fill="${C.dust}" font-size="10" text-anchor="end">${fmt(f*rMax)}</text>`;
  }
  const ci = DATA.campaign_start ? labels.indexOf(DATA.campaign_start) : -1;
  if (ci >= 0) svg += `<line x1="${xc(ci).toFixed(1)}" y1="${padT}" x2="${xc(ci).toFixed(1)}" y2="${padT+ih}" stroke="${C.ember}" stroke-width="1.5" stroke-dasharray="2 3"/>`;
  const nBars = series.filter(s => s.type==='bar').length;
  const bw = Math.max(1.5, Math.min(18, iw/n*0.72/(nBars||1)));
  let bi = 0;
  series.forEach((s,si) => {
    const Y = s.axis==='r' ? yR : yL;
    if (s.type === 'bar'){
      const off = (bi - (nBars-1)/2) * bw; bi++;
      plotted[si].forEach((v,i) => { if (v==null) return;
        svg += `<rect x="${(xc(i)+off-bw/2).toFixed(1)}" y="${Math.min(Y(0),Y(v)).toFixed(1)}" width="${bw.toFixed(1)}" height="${Math.max(.5,Math.abs(Y(v)-Y(0))).toFixed(1)}" fill="${s.color}"/>`; });
    } else if (s.type === 'line'){
      let d = '', pen = 0;
      plotted[si].forEach((v,i) => { if (v==null){ pen = 0; return; }
        d += `${pen ? 'L' : 'M'}${xc(i).toFixed(1)},${Y(v).toFixed(1)}`; pen = 1; });
      svg += `<path d="${d}" fill="none" stroke="${s.color}" stroke-width="1.8"${s.dash?' stroke-dasharray="4 3"':''}/>`;
    } else {
      plotted[si].forEach((v,i) => { if (v==null) return;
        svg += `<rect x="${(xc(i)-2.2).toFixed(1)}" y="${(Y(v)-2.2).toFixed(1)}" width="4.4" height="4.4" fill="${s.color}"/>`; });
    }
  });
  for (const i of [...new Set([0, n>>1, n-1])])
    svg += `<text x="${xc(i).toFixed(1)}" y="${H-6}" fill="${C.dust}" font-size="10" text-anchor="middle">${labels[i].slice(5)}</text>`;
  svg += `<line class="xh" x1="0" y1="${padT}" x2="0" y2="${padT+ih}" stroke="${C.dust}" stroke-width="1" visibility="hidden"/></svg>`;
  el.innerHTML = svg;
  const tip = $('#tip'), sv = el.querySelector('svg'), xh = el.querySelector('.xh');
  const idxAt = ev => { const r = sv.getBoundingClientRect();
    return Math.max(0, Math.min(n-1, Math.floor(((ev.clientX-r.left)/r.width*W - padL) / iw * n))); };
  el.onmousemove = ev => {
    const i = idxAt(ev);
    xh.setAttribute('x1', xc(i)); xh.setAttribute('x2', xc(i)); xh.setAttribute('visibility','visible');
    tip.innerHTML = `<div class="d">${labels[i]}</div>` + series.map((s,si) => { const v = s.vals[i];
      return `<div class="row"><span class="sq" style="background:${s.color}"></span>${s.name}<b>${v==null?'—':fmt(v, s.axis==='r'?0:cfg.money)}</b></div>`; }).join('');
    tip.hidden = false;
    const tw = 250;
    tip.style.left = (ev.clientX + 16 + tw > innerWidth ? ev.clientX - tw - 10 : ev.clientX + 16) + 'px';
    tip.style.top = (ev.clientY + 14) + 'px';
  };
  el.onmouseleave = () => { tip.hidden = true; xh.setAttribute('visibility','hidden'); };
  el.onclick = ev => selectDay(labels[idxAt(ev)]);
  return series;
}

  {id:'tvl', k:'total shielded value', v:fmt(S.tvl_usd,1), sub:'balance × price, live'},
  {id:'shielders', k:'unique shielders', v:fmt(S.cum_unique_shielders), sub:'+'+fmt(TODAY.new_shielders||0)+' today'},
  {id:'vk', k:'wallets with viewing key', v:fmt(S.cum_vk_wallets), sub:'+'+fmt(TODAY.new_vk_wallets||0)+' today'},
  {id:'notes', k:'active notes', v:fmt(S.active_notes), sub:fmt(S.cum_notes_created)+' created all-time'},
  {id:'actions', k:'shields today', v:fmt(TODAY.shields||0), sub:'7d avg '+fmt(S.avg7.shields)+'/day'},
  {id:'flow', k:'shielded in today', v:fmt(TODAY.deposit_usd||0,1), sub:'7d avg '+fmt(S.avg7.deposit_usd,1)+'/day'},
];
function renderTiles(){
  $('#tiles').innerHTML = TILES().map((t,i) =>
    `<div class="tile rise ${state.hero===t.id?'on':''}" data-h="${t.id}" style="animation-delay:${40+i*30}ms"><div class="k">${t.k}</div><div class="v num">${t.v}</div><div class="sub">${t.sub}</div></div>`).join('');
  document.querySelectorAll('.tile').forEach(el => el.onclick = () => setHero(el.dataset.h));
}

function setHero(h){ state.hero = h; renderTiles(); renderHero(); renderGrid(); renderLegsActive(); }

function renderHero(){
  const cfg = heroCfg();
  $('#heroTitle').textContent = cfg.t + ' — ' + state.range;
  const series = drawChart($('#heroChart'), {...cfg, hero:1});
  $('#heroLegend').innerHTML = legendHTML(series);
}

function renderGrid(){
  const grid = $('#grid');
  grid.innerHTML = Object.entries(HEROES).map(([id,h]) =>
    `<div class="panel small ${state.hero===id?'on':''}" data-h="${id}"><div class="phead"><div class="k">${h.t}</div></div><div class="chartbox" data-c="${id}"></div></div>`
  ).join('') + `<div class="panel"><div class="k">tvl legs (live balances) — click a token for its flows</div><table id="legs"></table></div>`;
  Object.entries(HEROES).forEach(([id,h]) => drawChart(grid.querySelector(`[data-c="${id}"]`), h));
  grid.querySelectorAll('.panel.small').forEach(p => p.onclick = ev => { if (!ev.target.closest('.chartbox')) setHero(p.dataset.h); });
  renderLegs();
}

function renderLegs(){
  const legs = Object.entries(S.tvl_legs).sort((a,b) => (b[1].usd||0)-(a[1].usd||0));
  $('#legs').innerHTML = `<tr><td class="sub">token</td><td class="sub r">amount</td><td class="sub r">usd</td></tr>` +
    legs.map(([sym,v]) => `<tr class="tok" data-s="${esc(sym.split('·')[0])}"><td>${esc(sym)}</td><td class="r num">${fmt(v.human)}</td><td class="r num">${v.usd==null?'no feed':fmt(v.usd,1)}</td></tr>`).join('');
  document.querySelectorAll('tr.tok').forEach(tr => tr.onclick = () => setHero('token:'+tr.dataset.s));
  renderLegsActive();
}
function renderLegsActive(){
  document.querySelectorAll('tr.tok').forEach(tr => tr.classList.toggle('on', state.hero === 'token:'+tr.dataset.s));
}

const DFIELDS = [['events','events'],['shields','shields'],['unshields','unshields'],['enc_notes','encrypted notes created'],
  ['notes_used','notes used'],['open_created','open notes created'],['open_deposited','open notes funded'],
  ['vk_set','viewing keys set'],['new_shielders','new shielders'],['new_vk_wallets','new vk wallets'],
  ['deposit_usd','shielded in (usd)',1],['withdraw_usd','unshielded out (usd)',1],['open_deposit_usd','open-note funded (usd)',1],
  ['cum_unique_shielders','unique shielders (cum)'],['cum_vk_wallets','vk wallets (cum)'],
  ['active_notes','active notes'],['derived_tvl_usd','reconstructed tvl (usd)',1]];
function selectDay(date){
  state.day = state.day === date ? null : date;
  const el = $('#detail'), r = DATA.daily.find(x => x.date === date);
  if (!state.day || !r){ el.hidden = true; $('#heroWrap').classList.remove('split'); return; }
  const toks = m => Object.entries(m||{}).filter(([,v])=>v).map(([s,v]) => `<dt>${esc(s)}</dt><dd>${fmt(v)}</dd>`).join('');
  el.innerHTML = `<span class="x" id="dx">×</span><div class="k">${r.date}</div>
    <dl>${DFIELDS.map(([k,l,m]) => `<dt>${l}</dt><dd>${fmt(r[k]??0,m)}</dd>`).join('')}</dl>
    ${Object.keys(r.by_token_deposit||{}).length ? `<h4>deposits by token</h4><dl>${toks(r.by_token_deposit)}</dl>` : ''}
    ${Object.keys(r.by_token_withdraw||{}).length ? `<h4>withdrawals by token</h4><dl>${toks(r.by_token_withdraw)}</dl>` : ''}`;
  el.hidden = false; $('#heroWrap').classList.add('split');
  $('#dx').onclick = () => selectDay(null);
}

function renderStatic(){
  $('#subline').innerHTML = `canonical privacy pool · <span class="mono">${DATA.pool}</span> · deployed 2026-04-20 · aggregate metrics only, by design · click tiles, charts, tokens and days`;
  const unp = S.unpriced_flow_events_total ? ` · unpriced flows excluded from usd series: ${S.unpriced_flow_events_total} events` : '';
  $('#footer').innerHTML = `generated ${S.generated_utc} · block ${S.latest_block} · prices: defillama address-keyed (per-day historical); gaps filled by nearest known day or configured proxy (strkBTC history ≈ WBTC, pUSDC ≈ USDC, vSTRK ≈ STRK)${unp} · "active notes" = notes created (incl. open notes) − notes used, an anonymity-set proxy, floored at 0 on charts · "encrypted note creations" proxy private transfers; per-user activity inside the pool is not observable — the product working as intended · unshield counts include swap legs routed through the pool · reconstructed tvl = cumulative public flows priced daily; it cannot see direct erc-20 transfers into the pool — snapshots are the truth · data: public starknet rpc, endpoint-pinned event pulls · event census + tvl independently audited vs voyager + receipts 2026-06-10 · <span class="mist">tab auto-refreshes every ${RELOAD_MIN} min · loaded ${new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span>`;
}

// restore UI state (range/hero/day) + scroll from the previous auto-reload, same tab
let _restoreDay = null;
try { const sv = JSON.parse(sessionStorage.getItem('strk20kpi') || 'null'); if (sv && typeof sv === 'object') { _restoreDay = sv.day; sv.day = null; Object.assign(state, sv); } } catch(e){}
renderStatic(); renderRanges(); renderBanner(); renderTiles(); renderHero(); renderGrid();
$('#shareX').onclick = () => {   // one-tap share: prefill X with the live tvl + the link (which unfurls the card)
  const text = `strk20 privacy pool — ${fmt(S.tvl_usd,1)} total value shielded · ${fmt(S.cum_unique_shielders)} wallets · live onchain`;
  window.open('https://twitter.com/intent/tweet?text=' + encodeURIComponent(text) + '&url=' + encodeURIComponent('https://strk20-shinobi-kpi.pages.dev/'), '_blank', 'noopener');
};
if (_restoreDay) selectDay(_restoreDay);   // reopen the day drill-down panel (toggles null -> day)
try { const y = +sessionStorage.getItem('strk20kpi_y') || 0; if (y) scrollTo(0, y); } catch(e){}
addEventListener('beforeunload', () => { try { sessionStorage.setItem('strk20kpi', JSON.stringify(state)); sessionStorage.setItem('strk20kpi_y', String(scrollY)); } catch(e){} });

// auto-refresh: reload the file (launchd regenerates it) — but never yank the page mid-interaction
let lastTouch = Date.now();
['pointerdown','keydown','wheel','mousemove'].forEach(ev => addEventListener(ev, () => lastTouch = Date.now(), {passive:true}));
setTimeout(function tick(){
  if (document.visibilityState === 'visible' && Date.now() - lastTouch > 30000) location.reload();
  else setTimeout(tick, 30000);   // tab hidden or in active use → re-check in 30s
}, RELOAD_MIN * 60000);
</script></body></html>
